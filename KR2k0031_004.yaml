body:
  text: 朝邑縣志跋道始至蒲臨河而西望朝邑即壯其山河之美比入境左唐關右隋宫盡覽其古跡之勝比入郭閭里輝聨後先掩映則又嘆其人物之秀且盛而果非他邑比也顧其邑志繁蕪汙穢不足以彰往而詔來道乃請諸五泉韓先生作此新志焉其視舊志雖省三之二然而爬羅剔抉昭昭乎可激勸于人者不啻加千百也既而又得對山康先生涇野吕先生序諸前後則斯志也滋可𫝊諸木以為斯邑實籍矣若夫企先賢而思齊覩名宦而思政慨風俗而思易移觀利病而思興革則又後之有志者事也于道何有哉時正德己卯九日吉旦知朝邑縣事山西陵川王道跋
