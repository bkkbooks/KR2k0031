body:
  text: 朝邑縣志卷二明韓邦靖撰名宦第五朝邑幅員不及二百里東有鹽灘西有鹽池凹南有沙苑皆不可耕可耕者才十分之二三耳而又界河渭漆沮三水者歲溢而善崩溢輒沒禾稼崩乃數十年不得田以故朝邑民獨貧少生業夫其和來安養獨在縣官耳縣官治績顯者洪武中則有縣丞卞禮宏建百規開先來者成化中則有知縣李英然英善修舉喜用民當其時聲名籍甚去之日民莫能思也𢎞治中則有知縣蘇槃廉謹不擾庶幾良吏近時則有知縣衛傑菲惡自持取與峻潔他無録焉若夫元氏以往其或治績莫考而名氏猶存茍非聞人碩士必其遺愛不忘用並書之以垂不朽而教諭翟方附焉晉歐陽建字堅石渤海人為朝邑尹唐劉幽永闕人為朝邑尉季邠闕人為朝邑尉畢縣令名次莫考元成好德顔英俱朝邑知縣明卞禮闕人洪武中為朝邑縣丞李英河南祥符縣人成化中為朝邑知縣升去蘇槃河南南陽縣人𢎞治中為朝邑知縣罷去衛傑山西夏縣人正德五年為朝邑知縣致仕去翟方山西榆次縣人成化中任儒學教諭善教朝邑科目成化中獨盛甲午科舉六人庚子科舉五人人物第六賢人長者懿德美行湮沒多矣豈不惜哉蓋𢎞治中沮水囓趙氏墓墓崩有石曰皇慶二年旌表孝子趙良漢籍少公嘗脫郭解于厄吏人蹤迹至少公少公乃自殺以滅口嚴撰唐則天時為詳審使活死囚八百餘人罷疑獄百人又原不實者千餘姓撰善風角繼李淳風為太史令占熒惑入輿鬼及諸張敗及諸陵墓事俱驗撰子向為鳯翔尹有政聲申屠思恭吕昂郭觚張元亨唐書云事親居喪著異行者元趙良孝子王亨為縣幕官亨孫由義至禮部侍郎歐陽玄王氏世德序曰亨為縣幕官持守端楷每與時尚同異遂棄去不仕由義為徽政院都事能抑內侍節浮費為御史纍有獻替從幸上京抗章論衛士縱牧踐民田行營無敢犯者又與時相爭江西行省戰功至相震怒不為動明髙翔程濟楊景學馬仲昌洪武中俱以明經徴翔有文學節行為監察御史髙皇帝甚眷注翔翔所論奏無不關國家機事當上心者革除間文皇帝素聞翔召翔將大用之會翔服喪服入見語又忤旨乃殺翔族其家沒入其産諸給高氏産者皆倍其稅曰以世世怒罵御史也御史親戚皆配為軍濟有法術為四川嶽池縣學教諭嶽池去朝邑數千里濟寢食俱在朝邑而日治嶽池學事不廢革除間上書言某月某日西北方兵起朝廷以為非所宜言繫至京召入將殺之濟叩頭曰陛下幸囚臣期而無兵臣死未晚也遂繫濟詔獄已而兵果起乃赦出濟更以為軍師護諸將北行與靖難軍先鋒戰於徐州大捷會曹國公師退文皇帝至江上濟逃去不知所終始徐州捷時諸將乃樹碑載戰伐次第及統軍者姓名濟一日夜往祭碑人莫測其故後文皇帝過徐州望見碑顧左右曰碑者何也或以狀對上大怒趣左右椎碑一再擊遽曰止止為我録碑來乃按碑族誅諸將無得脫者濟姓名正在擊處得免濟曩者之祭蓋禳之也楊景學縣丞馬仲昌大理寺左寺丞李濟樊冕蕭斌劉讓上志家君紹宗馬驤王卺房瑄韓邦竒韓邦靖牛斗王朝瑬俱登進士李濟官至左副都御史一統志云濟才敏學優歷官守法樊冕官至河南參政先為都給事中吏部擬冕户部侍郎英廟方嚮冕曰樊冕豈户部邪可吏部侍郎無何英廟晏駕乃不果用蕭斌至通政管易州柴厰保定府志稱其廉謹自守劉讓至知府讓有氣先為戶部主事監太倉與內臣爭席相惡乃謫東萊通判後為永平府同知永平府志稱其剛斷家君紹宗至福建按察司副使上志馬驤俱知縣王卺至郎中倜儻任豪數有論奏房瑄至按察使瑄先為郎中上疏論時政時人稱焉今家任丘韓邦竒至僉事韓邦靖至員外郎皆家君福建副使子今俱以罪譴為民牛斗今養親王朝瑬今依親韓邦靖曰𢎞治中教諭西蜀李君志朝邑其稱家君曰登進士仕至福建按察司副使居官有為執法平恕閩人思之成化中為刑部郎中朝廷有大獄擇公正官鞫之僉推公初往真定再往大同曲直允合上心𢎞治初元上疏論時政多所允俞云楊仲貞吳塤唐彛倫楊恭王翼趙整歸儒李睿王福馬駿王剛楊茂王孜王恪安永周道張玘王禮翟溫王質楊禮趙衡靳能陳善雷嚴周易韓倫楊圭趙鼒劉偉靳時熙安才孟熊郭鼐張磬劉永張珣梁文盛雷爵李貞蕭鵬周瑄李夔仇昉于章雷霓楊煥楊友黨爵東陽韓邦彥程範王朝雍雷子質孟填樊得仁俱鄉試舉人楊仲貞楊禮張磬仇昉俱至教授磬淳潔業尚書進士甚精吳塤府照磨唐彛倫王翼歸儒楊茂王禮靳能韓倫安才郭鼐李夔黨爵俱知縣倫剛介有行鼐治曹縣曹縣志稱其吏人畏服楊恭至陜西左布政使宣皇帝時恭謁吏部言事稱旨即日召見上以恭言事有才而見又容貌偉甚乃敕吏部與恭左布政使部尚書言左布政不缺員缺獨陜西恭不得往上曰朱買臣獨不為會稽邪恭奚不可陜西遂授恭恭頓首固辭上曰吾知若辭布政矣顧陜西鄉里撓而法耳乃令恭得便宜治事而賜免死劵十道又以子剛為錦衣指揮始恭行時入謝知縣知縣不為禮既得選乃令從者不得言布政衣故破衣納憑劵破囊中置驢上騎往見知縣知縣不知恭已得布政又為陜西勞之曰楊進士甚勞苦所得何官邪恭曰比知縣差大耳知縣素易恭聞恭言遂怒曰若言官大豈為布政邪縱布政將如朝邑知縣何恭笑曰安知非布政邪縱布政將朝邑耳乃徐徐出其囊中憑劵乃陜西布政也一縣人盡驚知縣卒得罪去趙整至監察御史周道至僉事道中式時驛歸將渡渭一婦人從後呼之婦人曰君騎卒妾子也妾寡居待此子以生念其當渡渭故追視之耳道惻然舍騎步歸後為御史征雲南夷總兵官餽貨寶幾千金道却之又為山西僉事有惠政卒于官喪出民遮道哭奠三日不得行李睿不仕王孜翟溫俱衛經歷王恪都司斷事王質趙鼒雷嚴楊友俱教諭趙衡陳善劉永俱訓導楊圭至太僕寺丞圭喜修廉隅飾儀度尚退不干教授禮子劉偉至知府以厚德稱先為文水文水刁悍劇縣偉不嚴而治梁文盛蕭鵬至知州雷爵張珣至府同知李貞周瑄雷霓于章俱至通判爵珣俱純篤廉謹至老不踰珣先為通判時吏部舉天下廉有司二十人珣與焉時人榮之楊煥韓邦彥今任知縣邦彥家君福建副使子王朝雍雷子質程範樊得仁孟填今舉進士朝雍郎中卺子範縣丞珏子餘未仕卒靳時熙知縣能子喬誠許清黃秀孟濟張亨張璟秦禮席慶仇約石秀李珍薛義李蓁馬恭張翼黨聰李敬李時楊濬楊寶孟震王臣趙璞馬賢唐通馬充韓威上忠楊銘周瓉王瑾劉紹翟祥暢廣程珏吳珦張輔李聰王純翟景陽王訥馬因吕聰王鋭孟奎尚貴馬輅俱歲貢喬誠至山西參政一統志云誠處心忠信措事寬平許清至知州黃秀孟濟秦禮石秀張翼楊濬王瑾暢廣俱知縣張亨王臣俱判官張璟楊銘李珍薛義趙璞唐通韓威周瓉俱訓導馬恭程珏李時上忠劉紹俱縣丞紹知府讓子黨聰李敬俱衛經歷楊寶州同知馬賢府照磨馬因州吏目餘不仕卒尉能吏員至光祿寺卿禮部右侍郎能有廉操歷官不營産業卒賜諭祭尉遲閏王式賈訥仇名善俱洪武中以人材徴閏至通判王式賈訥至知府仇名善至知縣周彧洪武中上書求仕進上召與語大悅乃授觀察使彧舉劾無所避于是百僚皆畏觀察使俄遷吏科給事中同東宫治秦邸獄歸乃升通政使以讒下獄籍其家得衣一襲俸米數升上召問曰通政官尊祿厚何大貧邪彧叩頭曰臣以草茅待罪九卿自知無功能不稱任使所得俸不敢盡受皆歸之官耳已而通政司乃上彧所歸俸金上知枉赦之因賜錦衣二襲寶鈔若干彧殁上嘆曰周彧難得朕用之不盡其才也劉偉田隆王朝璽蘇民望皆親喪廬墓三年偉仕監察御史璽望今納銀為監生嗚呼節義人之大間也豈非人之自立于世者歟吾觀世之達人通士號稱知道翩翩然以自異于世夫其日日稱説仁義不離口其自負豈在婦人女子下哉然竊觀其所以不逮逺矣吾邑有劉烈女者龍門村人女也成化中父母許婚楊氏楊氏子死女乃素服涕泣不食將臨其夫喪家人咸非笑之有舉人偉者女族兄也女往質焉偉曰汝所為誠是奈世俗何女曰吾所為求是而已矣奚以世俗為然家人竟止女不得往臨其夫喪女乃自縊死嗚呼斯人者蓋所謂建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑者也嗚呼烈矣節婦則尉太淑人薛氏韓氏宜人張氏馬宅妻王氏張三妻師氏王亨妻靳氏韓迪妻楊氏楊質妻張氏韓繼宗妻雷氏雜記第七漢莊熊罷言臨晉民願穿洛以溉重泉以東萬餘頃使鹵地誠得水可令畝收十石于是發卒萬餘人穿渠引洛水至商顔下唐太宗貞觀四年駕幸鹽池經朝邑賜朝邑民今年田租國朝正德庚午朝邑民周雄言朝邑縣東北故有鹽灘萬餘畝近年河水淤漫頗堪耕種當同常田徴稅巡按御史王廷相議曰朝邑鹽地雖暫堪耕種難保將來若便同常田徴稅將貽禍無窮乃不徴今鹽田果不可耕如御史議云正德戊寅朝邑民張某言朝邑太陽諸里民田圯于河幾萬餘畝乞議處田稅巡撫都御史鄭公移縣視狀知縣陵川王君請曰誠如民某言所圮田稅宜從輕額都御史可其議于是田以糧折布者凡若干畝關中南有肴函之固北有蕭榆之塞西阻棧道東據黃河古稱四塞之地故曰秦得百二焉然河自夏陽而比兩岸山嶺峻復不可以師夏陽而南經朝邑至潼關凡百里率平曠易渡故漢祖往來關中嘗由臨晉而七國謀反亦欲由臨晉入兵是朝邑者關中之隙道也故一方不戒三險俱失矣正德己卯知縣陵川王君言朝邑為山陜要衝與蒲華等然朝邑獨無驛所又近時河南應驛者率避潼關而之朝邑遂為三省之滙朝邑民不任供送于是巡撫都御史鄭公下其事乃以郃陽馬騾二十夫百人澄城馬騾十有五夫八十人協濟朝邑朝邑縣志卷二
