body:
  text: 朝邑縣志卷一明韓邦靖撰總志第一朝邑為縣起自西魏以據朝坂故名朝邑古為冀州之地殷周時為芮國有大荔戎秦厲恭公伐大荔取其王城築髙壘以臨晉國更名臨晉後晉奪河西之地乃以屬晉魏獻河西之地于秦乃復入秦漢為臨晉縣𨽻左馮翊有河水祠有芮鄉晉亦為臨晉縣又為左馮翊治後魏分置南五泉縣隋置長春宫尋復為朝邑縣唐亦為朝邑縣有河水祠西海祠武徳中析為河濱縣又為河西縣以𨽻河中府大厯中復為朝邑縣𨽻同州迄今因焉而以𨽻陜西西安府同州于天文為參之分野東有大慶關又東至於河東為蒲州蒲州者山西屬州也西有鐡亷山又西有髙陽城又西至于干興舖西為同州北有長春宫又北有苦泉又北至於金水河北為郃陽南有漆沮又南有太白池又南有麻子池又南至于渭南為華隂西南有沙苑城又有九龍池戸凡八十二里成化末歳大饑民多餓死又多亾去乃更為七十二里正徳五年又去其七里今為六十五里云縣先在西原上有相地者云城居髙而左下法不利知縣後其言稍稍騐乃更移置原下然無城景泰初知縣申閏築焉方三里有竒東門一西門二北無門南門一城中東偏為縣衙縣衙南為西安行府府南為儒學文廟在焉儒學南為按察分司西為布政分司布政分司北為城隍廟城隍廟北為隂陽學及醫學倉凡三所一在縣一在學一在城西原上壇凡三所社稷壇在城西北山川壇在城南邑厲壇在城北草塲二所一在城西一在山川壇東養濟院在城南教塲在城東桑棗園在教塲漏澤園在山川壇南舖凡一十八所在城者一城西者二城東者三城南者三城北者五西北者三社學凡三十所一在城一在柳村一在新市鎮一在趙渡鎮一在趙村一在南陽洪一在永興鎮一在大慶關一在白塚一在龍池一在龍門村一在白村一在辛城寨一在兩女鎮一在倉頭一在救駕莊一在許村一在顧現一在延夀一在王家莊一在八里莊一在泊子村一在嚴伯一在步昌一在苦泉鎮一在覇城一在小伏坡一在白池一在小村大慶關在縣東三十里即古蒲津關今設巡檢司𨽻潼關衛又置税課局關東即黄河西岸岸去水不甚髙然不溢他處或髙四五丈輒溢土人以為鐡牛鎮河故不溢鐵牛者唐時鑄鐵為牛置河兩岸岸各四牛各重數萬斤下為鐡山尾施鐡軸以繫浮橋旁置鐡人以象繫牛宋嘉祐中河漲橋壊盡西岸牛於河元有僧懐丙者乃為機法取牛河中已得三牛會有言取牛不難者丙怒棄去後人用其法取牛然牛竟不出今西岸止存三牛其一牛乃在河中始河漲時并壊岸元鐡判院仝僉條築焉西北為大荔戎城即王城左𫝊隂飴甥與秦伯盟於王城即此地後改為武鄉今廢唐𤣥宗過蒲關詩云鐘鼓嚴更曙山河野望通鳴鑾下蒲坂飛盖入雲中地險關逾壯天平鎮尚雄春來津樹合月落戍樓空馬色分朝景鷄聲逐曉風所希常道泰非復候繻同漆沮一名洛水自耀州同官縣來至朝邑東南三十里入渭成化中乃崩入河水北有新市鎮宋元置税監又有饒益寺寺中舊有藏春塢貯古名賢石刻今不存獨殿壁上有宋賈炎諸人題名石金趙抃記曰左馮之東南踰三十里縣曰朝邑由縣之直南林木蓊鬰小徑縈紆約有十里有鎮曰新市鎮有寺曰饒益乃陜右之名藍也路當秦晉要衝枕山河之形勢自唐宋以來名臣賢士經由往返莫不脱駕投憩于此或題名于壁或留詩于碑不可勝數前後主僧慮歳漫滅悉勒之于石寺遭兵火焚毁殆盡如前人石刻往往埋沒于頹垣遺基之下抃承乏命領鎮事至此恨不及見饒益全盛之時實為不足每暇日命童僕事銛築搜抉于荆蓁瓦礫之間雖獲名公大臣之行記詩刻例皆斷折訛缺讀之令人悲惋即其稍完者萃而置之于藏春塢壁冀後之游觀者興葺之不替然周覧環視必思其人焉時阜昌癸丑九月初一日東萊新市監趙抃記馬坊頭在縣西南十五里唐宋沙苑牧馬及上供牛羊皆置監于其地沙苑城在馬坊頭西廣可數十里即宇文泰敗髙歡唐王重榮敗邠寧朱孜處今歡所種柳不存低凹處乃多白楊太白池在馬坊頭西南三里池周廻可十餘里洞然深黑其上常有雲氣亦能致雨池中有大鼈嘗食飲馬人以為神池北為蓮池麻子池在太白池正北五里池迴長可二十里多蓮開花爛然映雲日池東南有安靖寺唐𤣥宗祀汾時駐蹕寺中今殿前有大柏樹懸宋崇寧中所鑄鐘九龍池在縣西南二十五里池東有覇城寺寺東北有靈應觀仙人張三丰嘗憇觀中今為道會司自九龍池東至于趙渡鎮漆沮經焉濱水皆種桃樹二三月時兩岸桃花紛然三十里不絶長春宫在縣西北原上後周宇文䕶所築隋文帝置殿其上以瞰河華洛渭宫下花木四時茂盛如春故名長春唐髙祖起兵太原西定長安休士於此東有金龍寺僧會司在焉西有元王由義墓南有唐嚴譔墓墓旁即譔祠苦泉在縣西北四十五里以飲羊不羶南有唐同州刺史姜師度通靈陂陂故溉田百餘頃今廢又南有元戈平章甘社寨金水河在苦泉東北五里自郃陽縣來舊嘗引水灌田今廢北為夏陽即韓信木罌渡處風俗第二語曰至治之極國無殊俗今天子神靈海内一統烏有所謂異俗者哉然閭閻趨向節序往來嬉戯之間則有與他處異者秦民皆力農朝邑頗事賈婚姻論財仕者尚廉有氣前輩盡然今少衰焉元日樹紙竿接天神以麻縛木炭置門上云吉利二日婿往拜婦家五日以故綵紙為婦人戊夜乃出婦人送窮二十三日置煎餅屋上補天是日仍不得食米清明婦女盡出遊觀三日乃已不得舉女工云即舉之且盲四月四日男女戴皂角葉已頭痛五月五日六月六日七月七日九月九日迎女之已嫁者臘月五日食五色煮豆豆者毒也食之已五毒物産第三朝邑無他竒産産獨服食他處俱有者不載載其美者多者果則瓜桃棃棗菜則韭蒜藥則麻黄甘遂香附枸杞魚則魴鯉畜則羊服則木綿絲絲出南陽洪者斷則易續引之則長田賦第四朝邑土田凡二萬四千一百四十九頃三十四畝户今一萬二千九十八户軍二千三百八十七户匠三百六戸雜役一百七十八戸餘俱民戸焉口凡六萬二千六百二十七口秋夏税凡二萬七千五百石有竒草七千三百六十束有竒木綿三千八十三斤絲綿六斤有竒布九千七百三十三疋絹一百八十二疋此其以田賦者其以丁賦者又有鹽鈔十有七萬六千八百四十貫貫准銀三釐黄丹二千斤斤准銀七分綿羯羊二十隻隻准銀六錢細辛一百三十斤斤准銀六分凡得銀五百一十六兩有竒又有石青大材木炸塊木柴黄熟銅山羊皮諸雜歲調多寡不同而力差不與焉𢎞治以前丁賦力差供歲足則止不派故能以三十六里更用而迭休之以後乃通取焉所以然者以用聽差者聴差者差已足無差而聽差也聽差者官盡收銀而貯之庫上戸丁九錢至七錢中户丁六錢至四錢下户丁三錢至一錢畸零者丁一錢于是無空民矣朝邑縣志卷一
