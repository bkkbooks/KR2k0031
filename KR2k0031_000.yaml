body:
  text: 朝邑縣志地理𩔖三都會郡縣之屬提要臣等謹案朝邑縣志二卷明韓邦靖撰邦靖字汝慶號五泉朝邑人正德戊辰進士官至工部員外郎是書成扵正德己夘上卷四篇曰總志曰風俗曰物産曰田賦下卷三篇曰名宦曰人物曰雜記上卷僅數頁下卷僅十餘頁古今志乗之簡無有過扵是書者而宏綱細目包括畧備葢他志多誇飾風土而此志能提其要故文省而事不漏也然叙次㸃綴若有餘閒寛然無局促束縛之迹自明以来推為竒作固不虚矣明代闗中輿記惟康海武功縣志與此志最為有名論者謂武功志體例謹嚴源出漢書此志筆墨疎宕源出史記然後來志乗多以康氏為宗而此志則莫能繼軌葢所謂不可無一不容有二者也前有邦靖自序又有康海序末有吕柟後序及朝邑知縣陵川王道跋並文格髙潔與志適相配云乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀朝邑縣志原序余讀郡邑志盖將極天下之撰矣然益繁而不能詳晦而不能白亂而不能理焉此安在於志耶夫志者記也記其風土文獻之事與官乎是郡邑者可以備極其改革省見其疾苦景行其已事察識其政治使天下為士大夫者讀之足以興為郡邑者讀之足以勸而已然非以誇靈勝之迹崇奨飾之細也而撰者之志每不皆若此焉且何以觀也朝邑令陵川王君涖縣之明年以五泉韓子汝慶所撰朝邑志刻成謂予宜序諸首予讀五泉子之志異而歎焉曰嗟乎此吾五泉子之所以為志也歟置縣沿革與山川故蹟官署諸事惟歸諸緫志此天下之所通見而不能裁者斯予之所謂繁而不詳晦而不白亂而不理者矣今畢以反之矣名宦所以志其官師之行事人物所以備其豪俊之餘烈其恐猶有所遺而未盡也括之以雜記開卷之際凡川源改革之異文獻散失之舊皆縷陳而無憾矣使郡邑之志皆若此其奚有不可也王君名道字統甫作縣而能先事于此此可以徴其政也正徳己卯九月十又八日巳酉滸西山人康海序朝邑舊有志然不載髙御史及劉烈女事二人者代不數人顧可弗録邪非也竒異如程濟善終如周彧寵任如楊恭迺畧而不書沮水入渭盖數千歳近時迺徑入河川源改革此其大者而弗著後之人何考焉他可知矣縣尹陵川王君曰是志且不傳然烏可以但已邪迺以與五泉韓子韓子於是乎編焉夫昔人之為朝邑志也豈不自以為善哉然後之人迺有議而更之者豈非一人之見有時而窮邪今之志如斯也夫今人之見猶昔人也夫其繁簡取與之間其可議者吾不知其有㡬也後之君子各以其所見删補而更正之猶今日焉斯為全志矣豈不善歟今志凡七篇正徳己卯二月六日五泉韓邦靖書
