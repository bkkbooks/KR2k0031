body:
  text: 朝邑縣志後序右朝邑志七篇工部員外五泉韓汝慶之所編也紀録質實而文彩煥炳可誦其𫝊人物說髙翔程濟及烈女劉氏事婉乎若覩其人真足以廉頑而立懦不可謂無筆力也而雜記一篇又多政事利害所關以示後之為朝邑者何惑焉其餘五篇事雖不異他志而紀例亦自殊稱為簡確之編信矣然則陵川王君純甫知是邑而刻此編人雖曰不良於政則吾不信也正德己卯秋七月草二日賜進士及第翰林院修撰儒林郎同修國史經筵講官高陵吕柟書
